user www-data;
worker_processes auto;
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=api_register:10m rate=5r/m;

  server {
    listen 80 default_server;
    return 308 https://$host$request_uri;
  }

  server {
    listen 443 ssl default_server;
    ssl_certificate /etc/aidp-lab/tls/tls.crt;
    ssl_certificate_key /etc/aidp-lab/tls/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/register {
      limit_req zone=api_register burst=4 nodelay;
      limit_req_status 429;
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    error_page 429 = @registration_rate_limited;
    location @registration_rate_limited {
      default_type application/json;
      return 429 '{"detail":"Too many registration attempts"}';
    }

    location /api/ {
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
