name: aidp-lab-dev

services:
  aidp-lab:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env.dev
    ports:
      - "127.0.0.1:18081:80"
      - "127.0.0.1:18444:443"
    volumes:
      - aidp-session-dev:/var/lib/aidp-lab
    restart: unless-stopped

volumes:
  aidp-session-dev:
