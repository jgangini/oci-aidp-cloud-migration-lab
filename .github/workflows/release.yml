name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: pip install -r apps/backend/requirements-dev.txt
      - run: pytest apps/backend/tests infra/terraform/tests
      - run: npm ci
        working-directory: apps/frontend
      - run: npm test && npm run build
        working-directory: apps/frontend
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false && terraform validate && terraform test
        working-directory: infra/terraform
      - run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
