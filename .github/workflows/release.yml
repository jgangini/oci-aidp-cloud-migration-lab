name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify the release tag is reachable from main
        run: |
          tag_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          git fetch origin main
          git merge-base --is-ancestor "$tag_commit" origin/main || {
            echo "Release tags must point to commits already reachable from main."
            exit 1
          }
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: pip install -r apps/backend/requirements-dev.txt
      - run: python -m pytest apps/backend/tests terraform/tests
        env:
          SESSION_SECRET_FILE: ${{ runner.temp }}/aidp-lab/session.key
      - run: npm ci
        working-directory: apps/frontend
      - run: npm test && npm run build
        working-directory: apps/frontend
      - run: terraform fmt -check -recursive
        working-directory: terraform
      - run: terraform init -backend=false && terraform validate && terraform test
        working-directory: terraform
      - name: Create or reuse GitHub release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; retaining it."
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
